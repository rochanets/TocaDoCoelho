<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toca do Coelho - Sales Engagement</title>
    <link rel="icon" type="image/png" href="/images/favicon-toca.png">
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --sidebar-expanded-width: clamp(210px, 18vw, 256px);
            --sidebar-collapsed-width: 84px;
            --sidebar-width: var(--sidebar-collapsed-width);
        }
        
        body { 
            font-family: 'Geist', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; 
            background: #194b3c;
            color: #1f2937; 
            min-height: 100vh;
            overflow-x: auto;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #194b3c;
            z-index: -1;
        }

        /* Sidebar */
        .sidebar {
            position: fixed;
            left: 12px;
            top: 12px;
            bottom: 12px;
            width: var(--sidebar-width);
            height: calc(100vh - 24px);
            background: linear-gradient(180deg, rgba(25, 75, 60, 0.4) 0%, rgba(10, 40, 30, 0.6) 100%);
            backdrop-filter: blur(24px) saturate(150%);
            -webkit-backdrop-filter: blur(24px) saturate(150%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-top: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            z-index: 110;
            box-shadow: 
                inset 0 1px 1px rgba(255, 255, 255, 0.1),
                inset 0 0 20px rgba(0, 0, 0, 0.2),
                0 12px 40px rgba(0, 0, 0, 0.4),
                0 0 15px rgba(25, 75, 60, 0.2);
            transition: width 0.24s ease, left 0.24s ease;
        }

        .sidebar-logo {
            padding: 10px 18px 6px;
            border-bottom: 1px solid rgba(226, 223, 213, 0.24);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .sidebar-logo img {
            width: 240px;
            height: 92px;
            max-width: 100%;
            object-fit: contain;
            flex-shrink: 0;
        }

        .sidebar-logo-expanded {
            display: none;
        }

        .sidebar-logo-collapsed {
            display: block;
            width: 56px !important;
            height: 56px !important;
            object-fit: contain;
            flex-shrink: 0;
        }

        .sidebar-logo-text h1 {
            font-size: 18px;
            font-weight: 700;
            color: #047857;
            margin-bottom: 2px;
        }

        .sidebar-logo-text p {
            font-size: 12px;
            color: rgba(52, 211, 153, 0.7);
        }

        .beta-badge {
            display: inline-flex;
            align-items: center;
            margin-left: 0;
            padding: 2px 6px;
            border-radius: 4px;
            background: #ef4444;
            color: #ffffff;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.04em;
            vertical-align: middle;
        }

        .sidebar-nav {
            flex: 1;
            padding: 8px 14px 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-height: 0;
            overflow-y: auto;
            scrollbar-gutter: stable;
        }

        .sidebar-nav::-webkit-scrollbar {
            width: 6px;
        }

        .sidebar-nav::-webkit-scrollbar-track {
            background: rgba(52, 211, 153, 0.08);
            border-radius: 999px;
        }

        .sidebar-nav::-webkit-scrollbar-thumb {
            background: rgba(52, 211, 153, 0.45);
            border-radius: 999px;
        }

        .sidebar-nav::-webkit-scrollbar-thumb:hover {
            background: rgba(5, 150, 105, 0.6);
        }

        .nav-item-settings {
            margin-top: auto;
        }

        .th-last-contact {
            font-size: 12px;
            white-space: nowrap;
        }

        .last-contact-text {
            font-size: 12px;
            white-space: nowrap;
        }

        .clients-email-col {
            font-size: 12px;
        }

        .config-shell {
            width: 50%;
            min-width: 420px;
            max-width: 720px;
        }

        .settings-grid {
            display: grid;
            gap: 14px;
            grid-template-columns: repeat(2, minmax(260px, 1fr));
            max-width: 920px;
            align-items: start;
        }

        .settings-card {
            background: rgba(255,255,255,0.9);
            border: 1px solid rgba(52, 211, 153, 0.25);
            border-radius: 14px;
            padding: 12px;
            height: fit-content;
            align-self: start;
        }

        .settings-card h3 {
            color: #047857;
            margin-bottom: 12px;
        }

        .settings-collapsible .settings-card-title {
            margin: 0;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 17px;
        }

        .settings-collapsible .settings-card-title::after {
            content: '▾';
            font-size: 12px;
            transition: transform 0.2s ease;
        }

        .settings-collapsible.settings-collapsed .settings-card-title::after {
            transform: rotate(-90deg);
        }

        .settings-card-body {
            margin-top: 12px;
        }

        .settings-collapsible.settings-collapsed .settings-card-body {
            display: none;
        }

        .status-label {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            white-space: nowrap;
        }

        .status-label i {
            font-size: 11px;
        }

        .status-label.green i { color: #16a34a; }
        .status-label.yellow i { color: #eab308; }

        .rule-list {
            display: grid;
            gap: 10px;
            margin-top: 12px;
        }

        .rule-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-radius: 10px;
            background: #f9fffc;
            border: 1px solid rgba(52, 211, 153, 0.2);
        }

        .greeting-avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid rgba(52, 211, 153, 0.25);
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            color: #e2dfd5;
            font-weight: 500;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
            font-size: 15px;
        }

        .nav-item:hover {
            background: rgba(226, 223, 213, 0.13);
            color: #e2dfd5;
        }

        .nav-item.active {
            background: linear-gradient(135deg, #bbf7d0 0%, #4ade80 100%);
            color: #064e3b;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 15px rgba(74, 222, 128, 0.3);
            font-weight: 600;
        }

        .nav-item i {
            width: 20px;
            text-align: center;
        }

        .sidebar-footer {
            padding: 16px;
            border-top: 1px solid rgba(226, 223, 213, 0.24);
            text-align: center;
            font-size: 12px;
            color: rgba(226, 223, 213, 0.8);
        }

        /* Main Content */
        .main-content {
            margin-left: calc(var(--sidebar-width) + 12px);
            min-height: 100vh;
            width: calc(100vw - var(--sidebar-width) - 12px);
            min-width: 0;
            padding: 112px 24px 24px;
            overflow-x: auto;
            box-sizing: border-box;
            transition: margin-left 0.24s ease, width 0.24s ease;
        }

        .main-topbar {
            position: fixed;
            top: 12px;
            left: calc(var(--sidebar-width) + 24px);
            right: 12px;
            width: auto;
            height: 80px;
            background: linear-gradient(90deg, rgba(25, 75, 60, 0.4) 0%, rgba(10, 40, 30, 0.6) 100%);
            backdrop-filter: blur(24px) saturate(150%);
            -webkit-backdrop-filter: blur(24px) saturate(150%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-top: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            z-index: 90;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 32px;
            box-shadow: 
                inset 0 1px 1px rgba(255, 255, 255, 0.1),
                inset 0 0 15px rgba(0, 0, 0, 0.2),
                0 8px 32px rgba(0, 0, 0, 0.3),
                0 0 10px rgba(25, 75, 60, 0.15);
            transition: left 0.24s ease, right 0.24s ease;
        }

        .topbar-module-title h1 {
            font-size: 28px;
            margin-bottom: 4px;
            color: #e2dfd5;
        }

        .topbar-module-title p {
            font-size: 14px;
            color: rgba(226, 223, 213, 0.84);
        }

        .topbar-user-block {
            display: flex;
            align-items: center;
            gap: 14px;
            background: transparent;
            border: none;
            border-radius: 14px;
            padding: 8px 14px;
        }

        .topbar-settings-btn {
            width: 40px;
            height: 40px;
            border-radius: 999px;
            border: 1px solid rgba(226, 223, 213, 0.3);
            background: rgba(226, 223, 213, 0.08);
            color: #e2dfd5;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .topbar-settings-btn:hover,
        .topbar-settings-btn.active {
            background: rgba(164, 224, 188, 0.56);
            color: #0c422a;
            border-color: rgba(226, 223, 213, 0.34);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .sidebar:hover {
            width: var(--sidebar-expanded-width);
        }

        .sidebar:hover ~ .main-topbar {
            left: calc(var(--sidebar-expanded-width) + 24px);
        }

        .sidebar:hover ~ .main-content {
            margin-left: calc(var(--sidebar-expanded-width) + 12px);
            width: calc(100vw - var(--sidebar-expanded-width) - 12px);
        }

        .sidebar:hover .sidebar-logo-expanded {
            display: block;
        }

        .sidebar:hover .sidebar-logo-collapsed {
            display: none;
        }
    </style>
</head>
<body>

</body>
</html>
